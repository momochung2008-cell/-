<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶貝不生氣加班計時器</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* 氣球與舞台區 */
        .stage-area {
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .balloon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.5s ease;
            transform-origin: bottom center;
        }

        .balloon {
            width: 50px;
            height: 60px;
            background-color: #ff6b6b;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: relative;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
        }

        /* 氣球反光點 */
        .balloon::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 10px;
            height: 15px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
        }

        /* 氣球結 */
        .balloon-knot {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 8px solid #ff6b6b;
            margin-top: -1px;
            transition: border-bottom-color 0.5s ease;
        }

        /* 氣球線 */
        .balloon-string {
            width: 2px;
            height: 40px;
            background-color: var(--text-muted);
            opacity: 0.5;
        }

        .explosion {
            font-size: 5rem;
            animation: popEffect 0.3s forwards;
            display: none;
        }

        @keyframes popEffect {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 700;
            font-family: monospace;
            margin: 10px 0;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .status-waiting { background-color: #334155; color: #cbd5e1; }
        .status-running { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); animation: pulse 2s infinite; }
        .status-exploded { background-color: var(--danger); color: white; }
        .status-done { background-color: rgba(34, 197, 94, 0.2); color: var(--success); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3);
            filter: brightness(1.1);
        }

        .btn:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .history-section {
            margin-top: 35px;
            border-top: 1px solid #334155;
            padding-top: 25px;
            text-align: left;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .btn-export {
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-export:hover {
            background-color: rgba(56, 189, 248, 0.1);
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            background-color: #151f32;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        /* 早下班與獎勵字體 */
        .text-success-reward {
            color: var(--success) !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BABY乖乖下班時間監控計時器</h1>
        <div class="subtitle">週一至週五 17:00 灌氣 🎈 | 20:00 炸裂 💥</div>

        <div class="stage-area">
            <div id="balloonContainer" class="balloon-container">
                <div id="balloonBody" class="balloon"></div>
                <div id="balloonKnot" class="balloon-knot"></div>
                <div class="balloon-string"></div>
            </div>
            <div id="explosionEffect" class="explosion">💥</div>
        </div>

        <div id="statusBar" class="status-badge status-waiting">等待加班時段 (17:00)</div>
        <div id="timer" class="timer-display">00:00:00</div>
        
        <button id="actionBtn" class="btn" onclick="triggerOffWork()">打卡下班</button>

        <div class="history-section">
            <div class="history-header">
                <span class="history-title">最近加班紀錄</span>
                <button class="btn-export" onclick="exportToCSV()">匯出 Excel (CSV)</button>
            </div>
            <div id="historyList" class="history-list">
                </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('overtime_records_v2')) || [];
        let isExploded = false;
        let isStoppedToday = false;

        function updateUI() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const day = now.getDay();
            const isWeekend = (day === 0 || day === 6);

            const statusBar = document.getElementById('statusBar');
            const timerDisplay = document.getElementById('timer');
            const actionBtn = document.getElementById('actionBtn');
            const balloonContainer = document.getElementById('balloonContainer');
            const balloonBody = document.getElementById('balloonBody');
            const balloonKnot = document.getElementById('balloonKnot');
            const explosionEffect = document.getElementById('explosionEffect');

            // 格式化當前時間顯示
            const timeString = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            // 判斷是否為今天已按下班
            const todayStr = now.toLocaleDateString();
            const hasDoneToday = records.some(r => r.date === todayStr);

            if (hasDoneToday || isStoppedToday) {
                statusBar.className = "status-badge status-done";
                statusBar.innerText = "今日打卡已完成 ✨";
                actionBtn.disabled = true;
                balloonContainer.style.display = "none";
                explosionEffect.style.display = "none";
                return;
            }

            // 判斷是否進入 17:00 - 20:00 加班爆破時段
            const currentTotalSeconds = (hours * 3600) + (minutes * 60) + seconds;
            const startTotalSeconds = 17 * 3600; // 17:00:00
            const endTotalSeconds = 20 * 3600;   // 20:00:00

            if (!isWeekend && currentTotalSeconds >= startTotalSeconds && currentTotalSeconds < endTotalSeconds) {
                // 【加班中 - 氣球膨脹】
                statusBar.className = "status-badge status-running";
                statusBar.innerText = "加班氣球灌氣中！請盡速下班！";
                actionBtn.disabled = false;
                balloonContainer.style.display = "flex";
                explosionEffect.style.display = "none";

                // 計算加班秒數與進度
                const overtimeSeconds = currentTotalSeconds - startTotalSeconds;
                const hrs = Math.floor(overtimeSeconds / 3600);
                const mins = Math.floor((overtimeSeconds % 3600) / 60);
                const secs = overtimeSeconds % 60;
                timerDisplay.innerText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

                // 氣球膨脹演算法：從 1.0 倍放大到最大 2.8 倍
                const maxOvertime = 3 * 3600; // 3小時
                const progress = Math.min(overtimeSeconds / maxOvertime, 1);
                const scale = 1 + (progress * 1.8);
                balloonContainer.style.transform = `scale(${scale})`;

                // 顏色漸變：綠(未加班) -> 黃 -> 紅(快爆炸)
                const red = Math.floor(107 + (progress * 148)); // 107 -> 255
                const green = Math.floor(107 - (progress * 107)); // 107 -> 0
                const blue = Math.floor(107 - (progress * 107));  // 107 -> 0
                balloonBody.style.backgroundColor = `rgb(${red}, ${green}, ${blue})`;
                balloonKnot.style.borderBottomColor = `rgb(${red}, ${green}, ${blue})`;

            } else if (!isWeekend && currentTotalSeconds >= endTotalSeconds) {
                // 【超時未下班 - 爆炸！】
                isExploded = true;
                statusBar.className = "status-badge status-exploded";
                statusBar.innerText = "💥 氣球炸裂！加班過度人生登出！";
                timerDisplay.innerText = "03:00:00+";
                actionBtn.disabled = true;

                balloonContainer.style.display = "none";
                explosionEffect.style.display = "block";
            } else {
                // 【正常上班時間 / 週末】
                statusBar.className = "status-badge status-waiting";
                statusBar.innerText = isWeekend ? "放假日休假中 🏖️" : "尚未到下午下班時間 (17:00)";
                timerDisplay.innerText = timeString;
                actionBtn.disabled = false; // 允許提前下班
                balloonContainer.style.transform = "scale(1)";
                balloonBody.style.backgroundColor = "#22c55e"; // 沒事時是安全綠色
                balloonKnot.style.borderBottomColor = "#22c55e";
                balloonContainer.style.display = "flex";
                explosionEffect.style.display = "none";
            }
        }

        function triggerOffWork() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            const currentTotalSeconds = (hours * 3600) + (minutes * 60) + seconds;
            const startTotalSeconds = 17 * 3600;

            let overtimeText = "00:00:00";
            let note = "";

            if (currentTotalSeconds < startTotalSeconds) {
                // 比 17:00 早下班！
                overtimeText = "00:00:00 (未加班)";
                note = "很棒!"; // 標註很棒
            } else {
                // 17:00 後下班
                const overtimeSeconds = currentTotalSeconds - startTotalSeconds;
                const hrs = Math.floor(overtimeSeconds / 3600);
                const mins = Math.floor((overtimeSeconds % 3600) / 60);
                const secs = overtimeSeconds % 60;
                overtimeText = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                note = "辛苦了";
            }

            const newRecord = {
                date: now.toLocaleDateString(),
                time: `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`,
                duration: overtimeText,
                note: note
            };

            records.unshift(newRecord);
            localStorage.setItem('overtime_records_v2', JSON.stringify(records));
            isStoppedToday = true;
            
            renderHistory();
            updateUI();
            alert(note === "很棒!" ? "早退/準時下班！太讚了，給你一個大拇指！👍" : "辛苦了！下班快回家休息吧！🚗");
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            records.forEach(r => {
                const item = document.createElement('div');
                item.className = "history-item";
                
                // 判斷是否為「很棒!」，若是則加入綠色高亮樣式
                const isReward = r.note === "很棒!";
                const noteSpanClass = isReward ? "text-success-reward" : "";

                item.innerHTML = `
                    <span>📅 ${r.date} (${r.time} 下班)</span>
                    <span class="${noteSpanClass}">⏳ ${r.duration} | ${r.note}</span>
                `;
                list.appendChild(item);
            });
        }

        function exportToCSV() {
            if (records.length === 0) {
                alert("目前沒有任何紀錄可以匯出喔！");
                return;
            }

            // CSV 標頭，微調欄位與提示
            let csvContent = "\uFEFF日期,下班打卡時間,加班總時數,統計備註\n";
            
            records.forEach(r => {
                csvContent += `"${r.date}","${r.time}","${r.duration}","${r.note}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `加班氣球紀錄表_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 每秒更新一次狀態
        setInterval(updateUI, 1000);
        // 初始化載入
        renderHistory();
        updateUI();
    </script>
</body>
</html>
