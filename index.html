<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💼BABY乖乖下班時間監控計時器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            font-size: 1.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-offwork {
            background-color: #ff5252;
            color: white;
        }
        .btn-offwork:hover {
            background-color: #ff3838;
        }
        .btn-backend {
            background-color: #4caf50;
            color: white;
        }
        .btn-backend:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💼BABY乖乖下班時間監控計時器</h1>
        
        <div id="timer-display">
            </div>

        <div class="btn-group">
            <button class="btn btn-offwork" onclick="submitOffWork()">🎉 我要下班了！</button>
            
            <a id="excelLink" class="btn btn-backend" href="#" target="_blank">📊 查看後台紀錄 (Google 試算表)</a>
        </div>
    </div>

    <script>
        // 1. 貼上你重新部署後取得的 Web App API 網址
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgndpuk-ujmuVONSAh_XDV0iuSmlK-QAY-f5qc60eoQl_F8AEqkBg0PhSLpXOv5Fds/exec";

        // 2. 貼上你的 Google 試算表瀏覽網址（瀏覽器網址列複製即可）
        const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/1IBJ-VecBgHEvqd_qonlkXye6RCIH8-ibhMJKzqc0Ros/edit?gid=0#gid=0";

        // 自動設定「查看後台紀錄」按鈕的連結
        document.getElementById("excelLink").href = GOOGLE_SHEET_URL;

        // 下班紀錄觸發函式
        function submitOffWork() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();

            // 提示發送中
            alert("正在記錄下班時間，請稍候...");

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    timestamp: now.toLocaleString(),
                    action: "下班簽退"
                })
            })
            .then(() => {
                alert("🎉 下班時間已成功寫入！您可以點擊下方按鈕查看試算表紀錄。");
            })
            .catch(error => {

                alert("紀錄失敗，請檢查網路或 Google API 設定。");
            });
        }
    </script>
</body>
</html>
