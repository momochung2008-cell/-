<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶貝不生氣加班計時器</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary-color: #ff6b6b;
            --success-color: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            width: 100%;
            max-width: 750px; /* 橫式寬度拉長 */
            text-align: center;
        }

        /* 標題強制一行，並根據寬度自動縮小字體 */
        h1 {
            font-size: clamp(1.2rem, 4vw, 2rem); 
            color: #2c3e50;
            margin-bottom: 25px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 橫式核心計時區區塊 */
        .timer-display-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px dashed #e2e8f0;
        }

        .timer {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2c3e50;
            font-variant-numeric: tabular-nums;
        }

        /* 小氣球與爆炸特效區域 */
        .balloon-zone {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balloon {
            font-size: 24px; /* 初始小小的 */
            transition: transform 0.3s ease;
            transform-origin: bottom center;
            display: inline-block;
        }

        /* 按鈕區改為橫向排列 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        #offWorkBtn {
            background-color: var(--primary-color);
            color: white;
        }

        #exportBtn {
            background-color: #34495e;
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            background-color: #e2e8f0;
            color: #4a5568;
            margin-bottom: 20px;
        }

        /* 紀錄表格樣式 */
        .log-container {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background-color: #edf2f7;
            color: #4a5568;
            padding: 10px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #edf2f7;
        }

        /* 準時/提早下班的鼓勵綠字樣式 */
        .good-job {
            color: var(--success-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">💼BABY乖乖下班時間監控計時器</h1>
    
    <div class="status-badge" id="statusBadge">等待 17:00 監控啟動</div>

    <div class="timer-display-wrapper">
        <div class="timer" id="timerDisplay">00:00:00</div>
        <div class="balloon-zone">
            <span class="balloon" id="overtimeBalloon">🎈</span>
        </div>
    </div>

    <div class="button-group">
        <button id="offWorkBtn" onclick="triggerOffWork()">打卡下班</button>
        <button id="exportBtn" onclick="exportToCSV()">導出加班紀錄</button>
    </div>

    <div class="log-container">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>簽退時間</th>
                    <th>加班時數</th>
                    <th>狀態狀態</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let timerInterval;
    let startTime;
    let isOvertime = false;
    let records = JSON.parse(localStorage.getItem('overtime_logs')) || [];

    // 初始化網頁與讀取舊紀錄
    window.onload = function() {
        updateLogTable();
        checkTimeRoutine();
        setInterval(checkTimeRoutine, 1000);
    };

    // 每日時間排程監控
    function checkTimeRoutine() {
        const now = new Date();
        const day = now.getDay();
        const hours = now.getHours();
        
        // 週一至週五
        if (day >= 1 && day <= 5) {
            if (hours >= 17 && hours < 20) {
                if (!isOvertime && !timerInterval) {
                    startOvertimeTimer();
                }
            } else if (hours >= 20) {
                // 超過 20:00 點沒點下班，氣球爆炸
                triggerExplosion();
            }
        }
    }

    // 啟動加班計時
    function startOvertimeTimer() {
        isOvertime = true;
        document.getElementById('statusBadge').innerText = "⚠️ 偵測到正在加班中！";
        document.getElementById('statusBadge').style.backgroundColor = "#ffdfdf";
        document.getElementById('statusBadge').style.color = "#ff6b6b";
        
        // 設定當天 17:00 為基準點
        startTime = new Date();
        startTime.setHours(17, 0, 0, 0);

        timerInterval = setInterval(updateTimerDisplay, 1000);
    }

    // 更新計時器與氣球大小
    function updateTimerDisplay() {
        const now = new Date();
        const diff = now - startTime;

        if (diff < 0) return;

        const hrs = String(Math.floor(diff / 3600000)).padStart(2, '0');
        const mins = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        const secs = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

        document.getElementById('timerDisplay').innerText = `${hrs}:${mins}:${secs}`;

        // 氣球隨時間微幅膨脹（最大放大到 2.5 倍，保持在右邊小小的但看得出變化）
        const totalMinutes = diff / 60000; 
        const scale = Math.min(1 + (totalMinutes * 0.01), 2.5);
        document.getElementById('overtimeBalloon').style.transform = `scale(${scale})`;
    }

    // 20:00 爆炸機制
    function triggerExplosion() {
        if (isOvertime) {
            clearInterval(timerInterval);
            document.getElementById('overtimeBalloon').innerText = "💥";
            document.getElementById('overtimeBalloon').style.transform = "scale(3)";
            document.getElementById('statusBadge').innerText = "💀 20:00 爆炸了！主人太辛苦了！";
            document.getElementById('timerDisplay').style.color = "#ff6b6b";
        }
    }

    // 按下打卡下班
    function triggerOffWork() {
        const now = new Date();
        const timeString = now.toTimeString().split(' ')[0];
        const dateString = now.toLocaleDateString();

        let overtimeHours = "00:00:00";
        let statusText = "準時/提早下班";
        let isEarly = true;

        if (isOvertime && timerInterval) {
            clearInterval(timerInterval);
            overtimeHours = document.getElementById('timerDisplay').innerText;
            statusText = "已記錄加班";
            isEarly = false;
        }

        // 建立新紀錄
        const newRecord = {
            date: dateString,
            time: timeString,
            duration: overtimeHours,
            early: isEarly
        };

        records.push(newRecord);
        localStorage.setItem('overtime_logs', JSON.stringify(records));
        
        // 重置介面
        isOvertime = false;
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById('timerDisplay').innerText = "00:00:00";
        document.getElementById('overtimeBalloon').innerText = "🎈";
        document.getElementById('overtimeBalloon').style.transform = "scale(1)";
        document.getElementById('statusBadge').innerText = "已下班！辛苦了 ❤️";
        document.getElementById('statusBadge').style.backgroundColor = "#e2e8f0";
        document.getElementById('statusBadge').style.color = "#4a5568";

        updateLogTable();
    }

    // 更新網頁紀錄表格
    function updateLogTable() {
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = "";

        records.slice().reverse().forEach(r => {
            const row = document.createElement('tr');
            
            // 判斷是否小於 17:00（提早/準時下班）給予綠字鼓勵
            const statusTdContent = r.early ? `<span class="good-job">很棒! </span>` : `<span>${r.duration}</span>`;
            const remarkText = r.early ? "準時下班" : "加班紀錄";

            row.innerHTML = `
                <td>${r.date}</td>
                <td>${r.time}</td>
                <td>${statusTdContent}</td>
                <td>${remarkText}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // 匯出為 Excel 兼容的 CSV 檔案
    function exportToCSV() {
        if (records.length === 0) {
            alert("目前還沒有任何下班紀錄可以導出唷！");
            return;
        }

        let csvContent = "\uFEFF"; // 填入 BOM 防止 Excel 開啟時亂碼
        csvContent += "日期,簽退時間,加班時數,備註\n";

        records.forEach(r => {
            const durationText = r.early ? "很棒!" : r.duration;
            const remarkText = r.early ? "準時下班" : "加班";
            csvContent += `${r.date},${r.time},${durationText},${remarkText}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `BABY_加班時間紀錄表_${new Date().toLocaleDateString()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
